  <p>竹取物語は、<strong>平安初期</strong>に著されたとされる、仮名による<strong>日本最古の物語</strong>。作者及び成立年は未詳。竹取の翁によって竹の中から見つけられた「かぐや姫」が、貴公子たちの求婚を次々と退け、帝の招聘も拒絶し、最後は月に帰ってしまう話。竹取物語は、「物語の祖」とも言われ、<strong>平安時代以降の物語</strong>に様々な影響を与えた作品であるとともに、子供から大人まで幅広く読み継がれた<strong>日本を代表する昔話の一つでもある</strong>。
  </p>
